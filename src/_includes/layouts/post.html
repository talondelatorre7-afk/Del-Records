{% extends "layouts/base.html" %}

{% block head %}
    <style>
        /* ============================================ */
        /* DEL RECORDS | MASTER EDITORIAL THEME         */
        /* ============================================ */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        :root {
            --del-abyss: #0A0A0A; 
            --del-red: #DC2626; 
            --del-surface: #121212; 
            --del-surface-light: #1A1A1A;
            --del-frost: #A3A3A3;
            --del-white: #FFFFFF;
        }

        .del-post-wrapper {
            background-color: var(--del-abyss);
            padding-bottom: 8rem;
            color: var(--del-frost);
            font-family: 'Inter', sans-serif;
            position: relative;
        }

        /* Cinematic Subtle Film Grain Overlay */
        .del-post-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.02;
            z-index: 0;
            pointer-events: none;
        }

        /* ============================================ */
        /* EDITORIAL HEADER SECTION                     */
        /* ============================================ */
        .del-editorial-header {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 11rem 1.5rem 2rem 1.5rem;
        }

        .del-top-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .del-breadcrumb {
            color: var(--del-frost);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s ease;
        }

        .del-breadcrumb:hover {
            color: var(--del-white);
        }

        .del-badge {
            background-color: rgba(220, 38, 38, 0.12);
            color: var(--del-red);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 1px solid rgba(220, 38, 38, 0.25);
        }

        .del-editorial-title {
            font-size: clamp(2.25rem, 5.5vw, 3.8rem);
            font-weight: 900;
            color: var(--del-white);
            line-height: 1.1;
            margin-bottom: 2.5rem;
            text-wrap: balance;
            letter-spacing: -0.03em;
        }

        /* Meta & Share Row */
        .del-meta-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 1.25rem 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .del-meta-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--del-frost);
            font-weight: 700;
        }

        .del-meta-item svg {
            width: 16px; height: 16px;
            color: var(--del-red);
        }

        .del-share-tools {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-left: auto;
        }

        .del-share-tools span {
            color: var(--del-frost);
            font-weight: 700;
        }

        .del-share-icon {
            color: var(--del-frost);
            display: flex;
            align-items: center;
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .del-share-icon:hover {
            color: var(--del-white);
            transform: translateY(-1px);
        }

        .del-share-icon svg {
            width: 16px; height: 16px;
        }

        /* ============================================ */
        /* EDITORIAL IMAGE CONTAINER                    */
        /* ============================================ */
        .del-editorial-media {
            position: relative;
            z-index: 2;
            max-width: 1100px;
            margin: 0 auto 3rem auto;
            padding: 0 1.5rem;
        }

        .del-editorial-media picture {
            display: block;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .del-editorial-media img {
            width: 100%;
            height: auto;
            max-height: 680px;
            object-fit: cover;
            display: block;
            filter: grayscale(5%);
        }

        /* ============================================ */
        /* MAIN ARTICLE BODY                            */
        /* ============================================ */
        .del-editorial-body {
            position: relative;
            z-index: 2;
            max-width: 740px; 
            margin: 0 auto;
            padding: 0 1.5rem;
            font-size: 1.15rem;
            line-height: 1.85;
            color: #D4D4D4;
        }

        .del-editorial-body h2, .del-editorial-body h3, .del-editorial-body h4 {
            font-weight: 800;
            color: var(--del-white);
            margin-top: 4rem;
            margin-bottom: 1.5rem;
            line-height: 1.25;
            letter-spacing: -0.02em;
        }

        .del-editorial-body h2 { font-size: 2rem; }

        .del-editorial-body p { margin-bottom: 1.8rem; }

        .del-editorial-body strong { color: var(--del-white); font-weight: 700; }

        .del-editorial-body a {
            color: var(--del-white);
            text-decoration: underline;
            text-decoration-color: var(--del-red);
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
            font-weight: 600;
            transition: color 0.3s ease, text-decoration-color 0.3s ease;
        }

        .del-editorial-body a:hover { color: var(--del-red); text-decoration-color: var(--del-white); }

        /* Italic Quotes & Captions */
        .del-editorial-body em, 
        .del-editorial-body p > em {
            color: rgba(255,255,255,0.6);
            font-style: italic;
        }
        
        /* Dedicated styling for Image Captions */
        .del-editorial-body figcaption {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            text-align: center;
            display: block;
            margin-top: 1rem; 
            margin-bottom: 3rem;
            font-style: italic;
            letter-spacing: 0.3px;
        }

        .del-editorial-body blockquote {
            border-left: 4px solid var(--del-red);
            padding: 2.5rem 2.5rem 2.5rem 3rem;
            margin: 4.5rem 0;
            background-color: var(--del-surface);
            border-radius: 0 16px 16px 0;
            font-size: 1.35rem;
            line-height: 1.7;
            font-style: italic;
            color: var(--del-white);
            position: relative;
            box-shadow: inset 10px 0 30px rgba(0,0,0,0.2);
        }

        .del-editorial-body blockquote::before {
            content: '“';
            position: absolute;
            top: 0px; left: 15px;
            font-size: 5rem;
            color: rgba(220, 38, 38, 0.15);
            font-family: serif;
            line-height: 1;
        }

        .del-editorial-body img {
            width: 100%; height: auto;
            border-radius: 12px;
            margin: 3rem 0 1rem 0;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ============================================ */
        /* FEATURED POSTS INJECTED COMPONENT FIX        */
        /* ============================================ */
        .del-featured-section {
            position: relative;
            z-index: 2;
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin-top: 8rem;
            padding-top: 6rem;
            background-color: rgba(0, 0, 0, 0.3);
        }

        .del-featured-section .cs-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .del-featured-section .cs-title {
            font-family: 'Inter', sans-serif !important;
            font-weight: 900 !important;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--del-white) !important;
            font-size: 1.75rem !important;
            margin-bottom: 3rem !important;
            text-align: left !important;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .del-featured-section .cs-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background-color: var(--del-red);
        }

        .del-featured-section .cs-card-group {
            display: grid !important;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)) !important;
            gap: 2.5rem !important;
            padding: 0 !important;
            margin: 0 !important;
            list-style: none !important;
        }

        .del-featured-section .cs-item {
            background-color: var(--del-surface) !important;
            border: 1px solid rgba(255,255,255,0.03) !important;
            border-radius: 12px !important;
            overflow: hidden !important;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease !important;
        }

        .del-featured-section .cs-item:hover {
            transform: translateY(-5px) !important;
            border-color: rgba(220, 38, 38, 0.3) !important;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5) !important;
        }

        .del-featured-section .cs-picture img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .del-featured-section .cs-item-text-group {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .del-featured-section .cs-h3 {
            font-size: 1.25rem !important;
            font-weight: 700 !important;
            color: var(--del-white) !important;
            margin: 0 0 0.75rem 0 !important;
            line-height: 1.4 !important;
        }

        .del-featured-section .cs-item-text {
            font-size: 0.95rem !important;
            color: var(--del-frost) !important;
            line-height: 1.5 !important;
            margin: 0 !important;
        }

        .del-featured-section .cs-link {
            color: var(--del-red) !important;
            text-decoration: none !important;
            font-weight: 700 !important;
            font-size: 0.9rem !important;
            text-transform: uppercase !important;
            letter-spacing: 0.5px !important;
            margin-top: auto !important;
            padding-top: 1.5rem !important;
            display: inline-flex !important;
            align-items: center;
            gap: 0.5rem;
        }

        @media (max-width: 768px) {
            .del-meta-row { flex-direction: column; align-items: flex-start; gap: 1.25rem; }
            .del-share-tools { margin-left: 0; width: 100%; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 1.25rem; }
        }
    </style>
{% endblock %}

{% block body %}
    <main class="del-post-wrapper">
        
        <!-- Editorial Header -->
        <header class="del-editorial-header">
            <div class="del-top-meta">
                <a href="/news/" class="del-breadcrumb">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Back to News
                </a>
                <span class="del-badge">Press Release</span>
            </div>

            <h1 class="del-editorial-title">{{ title }}</h1>

            <div class="del-meta-row">
                <div class="del-meta-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span>{{ author }}</span>
                </div>
                
                <div class="del-meta-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <span>{{ date | postDate }}</span>
                </div>

                <div class="del-share-tools">
                    <span>Share:</span>
                    <a href="#" class="del-share-icon" aria-label="Share on Facebook">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
                    </a>
                    <a href="#" class="del-share-icon" aria-label="Share on X">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733 -16z"></path><path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"></path></svg>
                    </a>
                    <a href="#" class="del-share-icon" aria-label="Share on LinkedIn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                    </a>
                    <a href="#" class="del-share-icon" aria-label="Copy Link">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    </a>
                </div>
            </div>
        </header>

        <!-- Main Featured Image -->
        <div class="del-editorial-media">
            <picture>
                <!--Mobile Image-->
                <source media="(max-width: 600px)" srcset="{% getUrl image | resize({ width: 576, height: 400 }) | avif %}" type="image/avif">
                <source media="(max-width: 600px)" srcset="{% getUrl image | resize({ width: 576, height: 400 }) | webp %}" type="image/webp">
                <source media="(max-width: 600px)" srcset="{% getUrl image | resize({ width: 576, height: 400 }) | jpeg %}" type="image/jpeg">
                <!--Tablet Image-->
                <source media="(max-width: 1024px)" srcset="{% getUrl image | resize({ width: 1600, height: 614 }) | avif %}" type="image/avif">
                <source media="(max-width: 1024px)" srcset="{% getUrl image | resize({ width: 1600, height: 614 }) | webp %}" type="image/webp">
                <source media="(max-width: 1024px)" srcset="{% getUrl image | resize({ width: 1600, height: 614 }) | jpeg %}" type="image/jpeg">
                <!--Desktop Image-->
                <source media="(min-width: 1024px)" srcset="{% getUrl image | resize({ width: 1600, height: 800 }) | avif %}" type="image/avif">
                <source media="(min-width: 1024px)" srcset="{% getUrl image | resize({ width: 1600, height: 800 }) | webp %}" type="image/webp">
                <source media="(min-width: 1024px)" srcset="{% getUrl image | resize({ width: 1600, height: 800 }) | jpeg %}" type="image/jpeg">
                <img src="{% getUrl image | resize({ width: 1600, height: 800 }) | jpeg %}" alt="{{ alt }}" width="800" height="400" decoding="async">
            </picture>
        </div>

        <!-- Article Content -->
        <article class="del-editorial-body">
            {{ content | safe }}
        </article>

        <!-- Conditionally render the Featured Posts section ONLY if there is more than 1 post -->
        {% if collections.post | length > 1 %}
            <section class="del-featured-section">
                {% include 'components/featured-posts.html' %}
            </section>
        {% endif %}

    </main>
{% endblock %}

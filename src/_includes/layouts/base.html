<!-- A fully fleshed-out <head>, dynamically changing based on client.json and the page front matter -->
<!DOCTYPE html>
<html lang="en">
    <link rel="preconnect" href="https://translate.google.com">
<link rel="preconnect" href="https://translate.googleapis.com" crossorigin>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <style>
            /* Force dark background instantly to prevent Flash of Light Mode */
            html, body, #cs-navigation {
                background-color: #0A0A0A !important;
                color: #A3A3A3 !important;
            }
        </style>

        <meta name="description" content="{{ description }}">
        <link rel="canonical" href="{{ client.domain }}{{ page.url }}">
        <meta name="generator" content="{{ eleventy.generator }}">

        <meta property="og:title" content="{{ title }}"/>
        <meta property="og:description" content="{{ description }}"/>
        <meta property="og:type" content="website"/>
        <meta property="og:url" content="{{ client.domain }}{{ page.url }}"/>
        <meta property="og:image" content="{{ image or "/assets/images/logo-small.png" }}"/>
        <meta property="og:image:secure_url" content="{{ image or "/assets/images/logo-small.png" }}"/>

        <link rel="icon" type="image/png" href="/assets/favicons/favicon-96x96.png" sizes="96x96"/>
        <link rel="icon" type="image/svg+xml" href="/assets/favicons/favicon.svg"/>
        <link rel="shortcut icon" href="/assets/favicons/favicon.ico"/>
        <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png"/>
        <meta name="apple-mobile-web-app-title" content="DEL Records"/>
        <link rel="manifest" href="/assets/favicons/site.webmanifest"/>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <link rel="preload" as="image" href="/assets/svgs/logo-black.svg">

        <link rel="stylesheet" href="/assets/css/root.css">
        <script defer src="/assets/js/dark.js"></script>
        <script defer src="/assets/js/nav.js"></script>

        {% block head %}{% endblock %}

        <title>{{ title }}</title>
    </head>
    <body>
        <a class="skip" aria-label="skip to main content" href="#main">Click To Skip To Main Content</a>

        {% include "sections/header.html" %}
        <main id="main">
            {% block body %}{% endblock %}
        </main>
        {% include "sections/footer.html" %}
        
        <!-- ============================================ -->
        <!-- ============================================ -->
        
        <!-- Hidden Google Translate Element -->
        <div id="google_translate_element" style="display: none;"></div>

        <!-- Engine Script -->
        <script type="text/javascript">
            function googleTranslateElementInit() {
                new google.translate.TranslateElement({
                    pageLanguage: 'en', 
                    includedLanguages: 'en,es', // Only load English and Spanish
                    autoDisplay: false
                }, 'google_translate_element');
            }

            // Function attached to our custom buttons
            function switchLanguage(lang) {
                // Set the translation cookie for Google
                document.cookie = `googtrans=/en/${lang}; path=/;`;
                document.cookie = `googtrans=/en/${lang}; domain=.${location.hostname}; path=/;`;
                // Reload page to apply the translation natively
                location.reload();
            }
        </script>
        <script defer type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

        <!-- CSS to completely hide Google's default UI, top banner, and hover glitches -->
        <style>
            /* Hide the top banner */
            .goog-te-banner-frame.skiptranslate { display: none !important; }
            
            /* Prevent Google from pushing the navbar down */
            body { top: 0 !important; } 
            
            /* Hide the hover tooltip popup */
            #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
            .VIpgJd-ZVi9od-ORHb-OEVmcd { display: none !important; }

            /* KILL THE WEIRD HOVER HIGHLIGHTING ON TEXT */
            .goog-text-highlight {
                background-color: transparent !important;
                box-shadow: none !important;
            }
            
            /* Target the specific background highlight classes Google applies dynamically */
            body .VIpgJd-yAWNEb-VIpgJd-fmcmS-sn-ik {
                background-color: transparent !important;
                box-shadow: none !important;
            }

            /* Google sometimes forces backgrounds on font tags during hover */
            font {
                background-color: transparent !important;
            }
        </style>
    </body>
</html>

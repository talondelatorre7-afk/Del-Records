<header id="cs-navigation">
    <div class="cs-container">
        <a href="/" class="cs-logo" aria-label="Deep Sea Digital Home" style="text-decoration: none;">
            <img class="cs-logo-dark" src="/assets/images/deep1.png" alt="Deep Sea Digital Logo" style="max-height: 48px; width: auto;">
        </a>

        
        <nav class="cs-nav" aria-label="main navigation">
            <button class="cs-toggle" id="cs-toggle" aria-expanded="false" aria-controls="cs-ul-wrapper" aria-label="mobile menu toggle" aria-haspopup="menu">
                <span class="cs-box" aria-hidden="true">
                    <span class="cs-line cs-line1" aria-hidden="true"></span>
                    <span class="cs-line cs-line2" aria-hidden="true"></span>
                    <span class="cs-line cs-line3" aria-hidden="true"></span>
                </span>
            </button>
            <div class="cs-ul-wrapper" id="cs-ul-wrapper" inert>
                <ul id="cs-expanded" class="cs-ul">
                    <li class="cs-li">
                        <a href="/" class="cs-li-link {% if page.url == '/' %} cs-active {% endif %}">Home</a>
                    </li>
                    <li class="cs-li">
                        <a href="/about/" class="cs-li-link {% if page.url == '/about/' %} cs-active {% endif %}">About</a>
                    </li>
                    <li class="cs-li">
                        <a href="/news/" class="cs-li-link {% if page.url == '/news/' %} cs-active {% endif %}">News</a>
                    </li>
                    <li class="cs-li">
                        <a href="/#artists" class="cs-li-link {% if page.url == '/artists/' %} cs-active {% endif %}">Artists</a>
                    </li>
                    <li class="cs-li">
                        <a href="https://store.delrecords.com/" target="_blank" rel="noopener" class="cs-li-link {% if page.url == '/store/' %} cs-active {% endif %}">Store</a>
                    </li>
                    <li class="cs-li">
                        <a href="/inquiry/" class="cs-li-link {% if page.url == '/inquiry/' %} cs-active {% endif %}">Service Inquiry</a>
                    </li>
                    <li class="cs-li">
                        <a href="/contact/" class="cs-li-link {% if page.url == '/contact/' %} cs-active {% endif %}">Contact</a>
                    </li>
                    <!-- DEL Premium Language Switcher -->
                    <li class="cs-li">
                     <div class="del-lang-switcher">
                    <button onclick="switchLanguage('en')" class="lang-btn" aria-label="English">English</button>
                        <span class="lang-div">/</span>
                    <button onclick="switchLanguage('es')" class="lang-btn" aria-label="Spanish">Español</button>
                        </div>
                    </li>

    <style>
       /* Styling to match the Abyss Theme Navbar */
        .del-lang-switcher {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-left: 1.5rem;
        background-color: #1A1A1A; /* Surface Light */
        padding: 0.35rem 0.75rem;
        border-radius: 50px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .del-lang-switcher .lang-btn {
        background: transparent;
        border: none;
        color: #A3A3A3; /* Frost */
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 0.75rem;
        cursor: pointer;
        padding: 0;
        transition: color 0.3s ease;
    }

    .del-lang-switcher .lang-btn:hover {
        color: #FFFFFF; /* White */
    }

    .del-lang-switcher .lang-div {
        color: #DC2626; /* DEL Red separator */
        font-size: 0.8rem;
        font-weight: 800;
        user-select: none;
    }
    
    /* Highlight the active language based on the cookie (Optional advanced UX) */
    html[lang="es"] .del-lang-switcher button[onclick*="'es'"] {
        color: #FFFFFF;
    }
</style>
                </ul>
            </div>
        </nav>
        
        
    </div>
</header>

<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <title>Content Manager | DEL Records</title>
</head>

<body>
    <script src="https://unpkg.com/decap-cms@3.0.0/dist/decap-cms.js"></script>

    <!-- Decap CMS preview pane script -->
    <script type="text/babel">
        const BlogPreview = createClass({
            render: function () {
                const data = this.props.entry.get("data").toJS();
                const { title, author, date: rawDate, image } = data;
                
                const date = typeof rawDate === "string" ? new Date(rawDate) : rawDate;
                let formattedDate = "";
                if (date && !isNaN(date.getTime())) {
                    formattedDate = Intl.DateTimeFormat("en-US", {
                        month: "long",
                        day: "numeric",
                        year: "numeric"
                    }).format(date);
                }

                const cover = this.props.getAsset(image);

                return (
                    <div className="blog">
                        {/* 1. Cover Image (Top) */}
                        {cover && <img src={cover.toString()} className="cover" alt="Cover" />}

                        {/* 2. Article Title */}
                        <h1 className="title">{title}</h1>

                        {/* 3. Author & Date Metadata */}
                        <div className="metadata">
                            <span className="author">{author}</span>
                            <span className="dot"></span>
                            <span className="date">{formattedDate}</span>
                        </div>

                        {/* 4. Article Content Body */}
                        <div className="markdown">
                            {this.props.widgetFor("body")}
                        </div>
                    </div>
                );
            }
        });

        // Register the elements and styles for the "blog" collection
        CMS.registerPreviewTemplate("blog", BlogPreview);
        CMS.registerPreviewStyle("/admin/decap-preview-styles.css");
    </script>
</body>

</html>
